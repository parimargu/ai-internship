const tagColors = {
  foundation: 'tag-foundation',
  preprocessing: 'tag-preprocessing',
  regression: 'tag-regression',
  classification: 'tag-classification',
  evaluation: 'tag-evaluation',
  unsupervised: 'tag-unsupervised'
};

const sections = [
  { label: "Foundations", ids: [1,2,3,4,5] },
  { label: "Preprocessing", ids: [6,7,8,18] },
  { label: "Regression", ids: [9] },
  { label: "Classification", ids: [10,11,12,13,14] },
  { label: "Evaluation", ids: [15,16,17,19] },
  { label: "Unsupervised", ids: [20] }
];

let current = 0;

function buildNav() {
  const nav = document.getElementById('nav-list');
  nav.innerHTML = '';
  sections.forEach(sec => {
    const lbl = document.createElement('div');
    lbl.className = 'nav-label';
    lbl.textContent = sec.label;
    nav.appendChild(lbl);
    sec.ids.forEach(id => {
      const c = concepts.find(x => x.id === id);
      const idx = concepts.indexOf(c);
      const item = document.createElement('div');
      item.className = 'nav-item' + (idx === current ? ' active' : '');
      item.innerHTML = `<span class="num">${c.id}</span>${c.title}`;
      item.onclick = () => { current = idx; render(); };
      nav.appendChild(item);
    });
  });
}

function render() {
  const c = concepts[current];
  buildNav();
  const area = document.getElementById('content-area');
  area.innerHTML = `
    <div class="concept-header">
      <span class="concept-tag ${tagColors[c.tag]}">${c.tagLabel}</span>
      <div class="concept-title">${c.title}</div>
      <div class="concept-subtitle">${c.subtitle}</div>
    </div>
    <div class="analogy-box">${c.analogy}</div>
    <div class="section">
      <div class="section-title">Key points</div>
      <div class="key-points">
        ${c.points.map(p => `<div class="key-point"><i class="ti ti-check" style="font-size:14px" aria-hidden="true"></i><span>${p}</span></div>`).join('')}
      </div>
    </div>
    <div class="section">
      <div class="section-title">Workflow</div>
      <div class="step-flow">
        ${c.steps.map((s,i) => `<span class="step-box">${s}</span>${i<c.steps.length-1?'<span class="step-arrow">→</span>':''}`).join('')}
      </div>
    </div>
    <div class="section">
      <div class="section-title">Code example</div>
      <div class="code-block">
        <div class="code-header">
          <span class="code-lang">python</span>
          <button class="code-copy" onclick="copyCode(this)"><i class="ti ti-copy" aria-hidden="true"></i> copy</button>
        </div>
        <pre id="code-content">${c.code}</pre>
      </div>
    </div>
    <div class="section">
      <div class="section-title">Output</div>
      <div class="output-block">${c.output.replace(/\n/g,'<br>')}</div>
    </div>
    <div class="bottom-nav">
      <button class="nav-btn" onclick="go(-1)" ${current===0?'disabled style="opacity:0.4"':''}>
        <i class="ti ti-arrow-left" aria-hidden="true"></i> Previous
      </button>
      <span class="progress-text">Concept ${current+1} of ${concepts.length}</span>
      <button class="nav-btn primary" onclick="go(1)" ${current===concepts.length-1?'disabled style="opacity:0.4"':''}>
        Next <i class="ti ti-arrow-right" aria-hidden="true"></i>
      </button>
    </div>
  `;
  area.scrollTop = 0;
}

function go(dir) {
  current = Math.max(0, Math.min(concepts.length - 1, current + dir));
  render();
}

function copyCode(btn) {
  const pre = document.getElementById('code-content');
  const text = pre.innerText;
  navigator.clipboard.writeText(text).then(() => {
    btn.innerHTML = '<i class="ti ti-check" aria-hidden="true"></i> copied!';
    setTimeout(() => { btn.innerHTML = '<i class="ti ti-copy" aria-hidden="true"></i> copy'; }, 1500);
  });
}

render();
</script>
